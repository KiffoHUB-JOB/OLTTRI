<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLT Finder — Buscador de Bairros</title>
  <a href="https://getsongbpm.com">BPM data powered by GetSongBPM</a>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12; --surface: #13161b; --surface2: #1a1e26;
      --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.14);
      --text: #e8eaf0; --muted: #6b7280; --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.18);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .page { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }

    .header { margin-bottom: 2.5rem; animation: fadeUp 0.5s ease both; }
    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 0.6rem; }
    .logo-icon {
      width: 36px; height: 36px; border: 1px solid var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-glow); box-shadow: 0 0 18px var(--accent-glow);
    }
    .logo-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
    .logo-text { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
    .header h1 { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; line-height: 1.2; }
    .header h1 strong { font-weight: 500; }
    .header p { margin-top: 6px; font-size: 13px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

    .stats-bar {
      display: flex; gap: 1px; margin-bottom: 1.5rem;
      border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
      animation: fadeUp 0.5s 0.08s ease both;
    }
    .stat-pill { flex: 1; background: var(--surface); padding: 10px 14px; text-align: center; }
    .stat-pill .val { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
    .stat-pill .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }

    .search-wrap { position: relative; margin-bottom: 1rem; animation: fadeUp 0.5s 0.14s ease both; }
    .search-wrap input {
      width: 100%; padding: 14px 48px;
      background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: 10px; font-family: 'IBM Plex Mono', monospace;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.04em;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    .clear-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 3px 8px; font-size: 11px;
      display: none; transition: color 0.12s; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em;
    }
    .clear-btn:hover { color: var(--text); }

    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; animation: fadeUp 0.5s 0.2s ease both; }
    .filter-btn {
      padding: 5px 13px; border-radius: 6px; font-size: 11px; font-weight: 500;
      font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.14s; text-transform: uppercase;
    }
    .filter-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .result-meta {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
      margin-bottom: 12px; letter-spacing: 0.06em; text-transform: uppercase;
      min-height: 18px; animation: fadeUp 0.5s 0.25s ease both;
    }

    #results { animation: fadeUp 0.5s 0.3s ease both; }

    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 6px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.15s, background 0.15s;
      position: relative; overflow: hidden;
    }
    .result-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 3px 0 0 3px;
      background: var(--stripe, #3b82f6); opacity: 0.8;
    }
    .result-card:hover { border-color: var(--border-hi); background: var(--surface2); }

    .olt-badge {
      display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500;
      letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; text-transform: uppercase;
    }

    .k-idc         { --stripe:#3b82f6; } .b-idc         { background:#1d3557; color:#90caf9; }
    .k-esperanca   { --stripe:#fbbf24; } .b-esperanca   { background:#2d1b00; color:#fbbf24; }
    .k-veneza      { --stripe:#4ade80; } .b-veneza      { background:#0f2918; color:#4ade80; }
    .k-timoteo     { --stripe:#f9a8d4; } .b-timoteo     { background:#2a1020; color:#f9a8d4; }
    .k-tplink01    { --stripe:#38bdf8; } .b-tplink01    { background:#0d2233; color:#38bdf8; }
    .k-tplink02    { --stripe:#a78bfa; } .b-tplink02    { background:#1a1240; color:#a78bfa; }
    .k-tplink03    { --stripe:#fb923c; } .b-tplink03    { background:#2a1200; color:#fb923c; }
    .k-tplink04    { --stripe:#86efac; } .b-tplink04    { background:#1a2a10; color:#86efac; }
    .k-mangueiras  { --stripe:#22d3ee; } .b-mangueiras  { background:#001d2a; color:#22d3ee; }
    .k-paraiso     { --stripe:#c084fc; } .b-paraiso     { background:#200d2d; color:#c084fc; }

    .card-info { flex: 1; min-width: 0; }
    .bairro-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .olt-full { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.03em; }

    .highlight { background: rgba(251,191,36,0.18); color: #fbbf24; border-radius: 2px; padding: 0 2px; }

    .empty { text-align: center; padding: 4rem 0; color: var(--muted); }
    .empty svg { width: 36px; height: 36px; stroke: var(--muted); fill: none; stroke-width: 1.5; margin-bottom: 12px; opacity: 0.4; display: block; margin-left: auto; margin-right: auto; }
    .empty p { font-size: 13px; font-family: 'IBM Plex Mono', monospace; }

    footer { margin-top: 3rem; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.4; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 500px) {
      .stat-pill .val { font-size: 15px; }
      .header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="logo-text">OLT Finder</span>
    </div>
    <h1>Buscador de <strong>OLT</strong> por Bairro</h1>
    <p>// pesquise o bairro e descubra qual OLT atende a região</p>
  </div>

  <div class="stats-bar">
    <div class="stat-pill"><div class="val" id="totalBairros">—</div><div class="lbl">Bairros</div></div>
    <div class="stat-pill"><div class="val">10</div><div class="lbl">OLTs</div></div>
    <div class="stat-pill"><div class="val" id="totalReg">—</div><div class="lbl">Registros</div></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input type="text" id="searchInput" placeholder="ex: CENTRO, VENEZA, IPABA..." autocomplete="off" spellcheck="false" />
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">ESC</button>
  </div>

  <div class="filter-row" id="filterRow"></div>
  <div class="result-meta" id="resultMeta"></div>
  <div id="results"></div>

  <footer>&copy; 2026 &mdash; OLT Finder &mdash; todos os registros</footer>
</div>

<script>
const data = [
  // IDC-OLT
  {bairro:"BETHANIA",olt:"IDC-OLT",k:"idc"},
  {bairro:"VILA CELESTE",olt:"IDC-OLT",k:"idc"},
  {bairro:"TIRADENTES",olt:"IDC-OLT",k:"idc"},
  {bairro:"RESIDENCIAL BETHANIA",olt:"IDC-OLT",k:"idc"},
  {bairro:"INDUSTRIAL",olt:"IDC-OLT",k:"idc"},
  {bairro:"CANAA",olt:"IDC-OLT",k:"idc"},
  {bairro:"CANAANZINHO",olt:"IDC-OLT",k:"idc"},
  {bairro:"TAUBAS",olt:"IDC-OLT",k:"idc"},
  {bairro:"GRANJAS VAGALUME",olt:"IDC-OLT",k:"idc"},
  {bairro:"VILA MILITAR",olt:"IDC-OLT",k:"idc"},
  {bairro:"JARDIM VITORIA",olt:"IDC-OLT",k:"idc"},
  {bairro:"CHACARAS MADALENA",olt:"IDC-OLT",k:"idc"},
  {bairro:"PARQUE CARAVELAS",olt:"IDC-OLT",k:"idc"},
  {bairro:"BOM PASTOR",olt:"IDC-OLT",k:"idc"},
  {bairro:"FURQUILHA",olt:"IDC-OLT",k:"idc"},
  {bairro:"AGUAS CLARAS",olt:"IDC-OLT",k:"idc"},
  {bairro:"PANORAMA",olt:"IDC-OLT",k:"idc"},
  {bairro:"IGUAÇU",olt:"IDC-OLT",k:"idc"},
  {bairro:"GRAN ROYALLE",olt:"IDC-OLT",k:"idc"},
  {bairro:"CORREGO DA GARRAFA",olt:"IDC-OLT",k:"idc"},
  {bairro:"BOM SUCESSO",olt:"IDC-OLT",k:"idc"},

  // OLT ESPERANÇA
  {bairro:"ESPERANÇA",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"BOM JARDIM",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"NOVO ESPERAÇA",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"IGUAÇU",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"IDEAL",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"LIMOEIRO",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"CHACARAS MADALENA",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"BARRA ALEGRA",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"PEDRA BRANCA",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"VILA CELESTE",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"VILA FORMOSA",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"CORREGO NOVO",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"CIDADE NOBRE",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"FERROVIARIOS",olt:"OLT ESPERANÇA",k:"esperanca"},
  {bairro:"CORREGO DOS BECAS",olt:"OLT ESPERANÇA",k:"esperanca"},

  // OLT MANGUEIRAS / TPLINK MANGUEIRAS
  {bairro:"BOM RETIRO",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},
  {bairro:"HORTO",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},
  {bairro:"AMARO LANARI",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},
  {bairro:"IMBAUBAS",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},
  {bairro:"DAS AGUAS",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},
  {bairro:"BELA VISTA",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},
  {bairro:"FABRICIANO",olt:"OLT MANGUEIRAS / TPLINK MANGUEIRAS",k:"mangueiras"},

  // OLT HUAWEI IDC VENEZA
  {bairro:"VENEZA",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"CENTRO",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"CIDADE NOVA",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"PARQUE DAS ÁGUAS",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"CARIRU",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"CASTELO",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"PORTO SEGURO",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"ILHA DO RIO DOCE",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"VILA IPANEMA",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"LAGOA SILVANA",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"AEROPORTO",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},
  {bairro:"CHACARAS DO VALE",olt:"OLT HUAWEI IDC VENEZA",k:"veneza"},

  // OLT HUAWEI X7 IDC PARAISO
  {bairro:"CENTRO DE SANTANA",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"CELO ORIENTE",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"OLIVEIRA",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"RESIDENCIAL PARAISO",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"CHACARAS PARAISO",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"AREIA GROSSA",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"ALTO DE SANTANA",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"JOSEFINO ANICIO",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"VERANEIO",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},
  {bairro:"VALE DO PARAISO",olt:"OLT HUAWEI X7 IDC PARAISO",k:"paraiso"},

  // OLT TIMOTEO HUAWEI
  {bairro:"TIMOTEO",olt:"OLT TIMOTEO HUAWEI",k:"timoteo"},

  // OLTs IPABA
  {bairro:"IPABA",olt:"OLT TPLINK 01 - IPABA / TEMPLATE TPLINK BRIDGE",k:"tplink01"},
  {bairro:"IPABA",olt:"OLT TPLINK 02 - IPABA / TEMPLATE TPLINK BRIDGE",k:"tplink02"},
  {bairro:"IPABA",olt:"OLT TPLINK 03 - IPABA / TEMPLATE TPLINK BRIDGE",k:"tplink03"},
  {bairro:"IPABA",olt:"OLT TPLINK 04 - IPABA / TEMPLATE TPLINK BRIDGE",k:"tplink04"}
];

const labels = {
  idc:"IDC-OLT", esperanca:"OLT Esperança", veneza:"OLT Huawei Veneza",
  timoteo:"OLT Timoteo", tplink01:"TPLink 01", tplink02:"TPLink 02",
  tplink03:"TPLink 03", tplink04:"TPLink 04", mangueiras:"OLT Mangueiras", paraiso:"OLT Paraíso"
};

const filterDefs = [
  {k:"all",l:"Todos"},{k:"idc",l:"IDC"},{k:"esperanca",l:"Esperança"},
  {k:"veneza",l:"Veneza"},{k:"timoteo",l:"Timoteo"},{k:"tplink01",l:"TP01"},
  {k:"tplink02",l:"TP02"},{k:"tplink03",l:"TP03"},{k:"tplink04",l:"TP04"},
  {k:"mangueiras",l:"Mangueiras"},{k:"paraiso",l:"Paraíso"}
];

document.getElementById("totalBairros").textContent = new Set(data.map(d=>d.bairro)).size;
document.getElementById("totalReg").textContent = data.length;

let activeFilter = "all", query = "";

function renderFilters() {
  document.getElementById("filterRow").innerHTML = filterDefs.map(f =>
    `<button class="filter-btn${activeFilter===f.k?" active":""}" onclick="setFilter('${f.k}')">${f.l}</button>`
  ).join("");
}

function setFilter(k) { activeFilter = k; renderFilters(); render(); }

function hl(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return text.slice(0,i)+`<span class="highlight">${text.slice(i,i+q.length)}</span>`+text.slice(i+q.length);
}

function render() {
  const q = query.trim();
  document.getElementById("clearBtn").style.display = q ? "block" : "none";

  const seen = new Set();
  const unique = data.filter(d => {
    const fOk = activeFilter==="all" || d.k===activeFilter;
    const qOk = !q || d.bairro.toLowerCase().includes(q.toLowerCase()) || d.olt.toLowerCase().includes(q.toLowerCase());
    if (!fOk||!qOk) return false;
    const key = d.bairro+d.olt;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  document.getElementById("resultMeta").textContent = unique.length > 0
    ? `// ${unique.length} registro${unique.length!==1?"s":""} encontrado${unique.length!==1?"s":""}`
    : "";

  if (unique.length === 0) {
    document.getElementById("results").innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>// nenhum resultado para "${q || labels[activeFilter] || activeFilter}"</p>
    </div>`;
    return;
  }

  document.getElementById("results").innerHTML = unique.map(d => `
    <div class="result-card k-${d.k}">
      <span class="olt-badge b-${d.k}">${labels[d.k]||d.k}</span>
      <div class="card-info">
        <div class="bairro-name">${hl(d.bairro,q)}</div>
        <div class="olt-full">${hl(d.olt,q)}</div>
      </div>
    </div>
  `).join("");
}

function clearSearch() {
  document.getElementById("searchInput").value=""; query=""; render();
}

document.getElementById("searchInput").addEventListener("input", function(){ query=this.value; render(); });
renderFilters(); render();
</script>
</body>
</html>
