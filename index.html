<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de OLT por Bairro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f2;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.22);
      --text-primary: #1a1a1a;
      --text-secondary: #5f5e5a;
      --text-tertiary: #999890;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #252523;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.22);
        --text-primary: #f0ede8;
        --text-secondary: #a8a69f;
        --text-tertiary: #6b6a64;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .search-box {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 16px;
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 13px 44px;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-lg);
      font-size: 15px;
      background: var(--surface);
      color: var(--text-primary);
      outline: none;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .search-box input:focus {
      border-color: #378ADD;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
    }

    .search-box input::placeholder { color: var(--text-tertiary); }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      display: none;
      padding: 4px;
      border-radius: 50%;
      transition: color 0.12s;
    }

    .clear-btn:hover { color: var(--text-primary); }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 0.5px solid var(--border-hover);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
    }

    .filter-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    .filter-btn.active {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    .stats {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.15s;
    }

    .result-card:hover { border-color: var(--border-hover); }

    .olt-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .olt-idc        { background: #D3E8FF; color: #0C447C; }
    .olt-esperanca  { background: #FAEEDA; color: #633806; }
    .olt-veneza     { background: #C0DD97; color: #27500A; }
    .olt-timoteo    { background: #F4C0D1; color: #72243E; }
    .olt-tplink01   { background: #9FE1CB; color: #085041; }
    .olt-tplink02   { background: #B5D4F4; color: #0C447C; }
    .olt-tplink03   { background: #F5C4B3; color: #712B13; }
    .olt-tplink04   { background: #CECBF6; color: #3C3489; }
    .olt-mangueiras { background: #B5D4F4; color: #185FA5; }
    .olt-paraiso    { background: #FAEEDA; color: #854F0B; }

    .card-content { flex: 1; min-width: 0; }

    .bairro-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .olt-name {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .highlight {
      background: #FFF3B0;
      color: #6B5A00;
      border-radius: 2px;
      padding: 0 2px;
    }

    .empty {
      text-align: center;
      padding: 3rem 0;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Buscador de OLT por Bairro</h1>
      <p>Pesquise o bairro para descobrir qual OLT atende a região</p>
    </header>

    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Pesquisar bairro ou OLT..." autocomplete="off" />
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">&#10005;</button>
    </div>

    <div class="filter-row" id="filterRow"></div>

    <div class="stats" id="stats"></div>
    <div id="results"></div>

    <footer>Buscador de OLT &mdash; Todos os direitos reservados</footer>
  </div>

  <script>
    const data = [

      { bairro: "VILA CELESTE", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "TIRADENTES", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "RESIDENCIAL BETHANIA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "INDUSTRIAL", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "CANAA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "CANAANZINHO", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "TAUBAS", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "GRANJAS VAGALUME", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "VILA MILITAR", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "JARDIM VITORIA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "CHACARAS MADALENA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "PARQUE CARAVELAS", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "BOM PASTOR", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "FURQUILHA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "AGUAS CLARAS", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "PANORAMA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "IGUAÇU", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "GRAN ROYALLE", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "CORREGO DA GARRAFA", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "BOM SUCESSO", olt: "IDC-OLT", oltKey: "idc" },
      { bairro: "ESPERANÇA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "BOM JARDIM", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "NOVO ESPERAÇA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "IGUAÇU", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "IDEAL", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "LIMOEIRO", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "CHACARAS MADALENA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "BARRA ALEGRA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "PEDRA BRANCA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "VILA CELESTE", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "VILA FORMOSA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "CORREGO NOVO", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "CIDADE NOBRE", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "FERROVIARIOS", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "CORREGO DOS BECAS", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "MANGUEIRAS", olt: "OLT MANGUEIRAS / TPLINK MANGUEIRAS", oltKey: "mangueiras" },
      { bairro: "BOM RETIRO", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "HORTO", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "AMARO LANARI", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "IMBAUBAS", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "DAS AGUAS", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "BELA VISTA", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "FABRICIANO", olt: "OLT ESPERANÇA", oltKey: "esperanca" },
      { bairro: "VENEZA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CENTRO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CIDADE NOVA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "PARQUE DAS ÁGUAS", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CARIRU", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CASTELO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "PORTO SEGURO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "ILHA DO RIO DOCE", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "VILA IPANEMA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "LAGOA SILVANA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "AEROPORTO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CHACARAS DO VALE", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "PARAISO", olt: "OLT HUAWEI X7 IDC PARAISO", oltKey: "paraiso" },
      { bairro: "CENTRO DE SANTANA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CELO ORIENTE", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "OLIVEIRA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "RESIDENCIAL PARAISO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "CHACARAS PARAISO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "AREIA GROSSA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "ALTO DE SANTANA", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "JOSEFINO ANICIO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "VERANEIO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "VALE DO PARAISO", olt: "OLT HUAWEI IDC VENEZA", oltKey: "veneza" },
      { bairro: "TIMOTEO", olt: "OLT TIMOTEO HUAWEI", oltKey: "timoteo" },
      { bairro: "IPABA", olt: "OLT TPLINK 01 - IPABA / TEMPLATE TPLINK BRIDGE", oltKey: "tplink01" },
      { bairro: "IPABA", olt: "OLT TPLINK 02 - IPABA / TEMPLATE TPLINK BRIDGE", oltKey: "tplink02" },
      { bairro: "IPABA", olt: "OLT TPLINK 03 - IPABA / TEMPLATE TPLINK BRIDGE", oltKey: "tplink03" },
      { bairro: "IPABA", olt: "OLT TPLINK 04 - IPABA / TEMPLATE TPLINK BRIDGE", oltKey: "tplink04" },
    ];

    const oltLabels = {
      idc: "IDC-OLT",
      esperanca: "OLT Esperança",
      veneza: "OLT Huawei Veneza",
      timoteo: "OLT Timoteo Huawei",
      tplink01: "TPLink 01 - Ipaba",
      tplink02: "TPLink 02 - Ipaba",
      tplink03: "TPLink 03 - Ipaba",
      tplink04: "TPLink 04 - Ipaba",
      mangueiras: "OLT Mangueiras",
      paraiso: "OLT Paraíso",
    };

    const filters = [
      { key: "all", label: "Todos" },
      { key: "idc", label: "IDC-OLT" },
      { key: "esperanca", label: "Esperança" },
      { key: "veneza", label: "Veneza" },
      { key: "timoteo", label: "Timoteo" },
      { key: "tplink01", label: "TPLink 01" },
      { key: "tplink02", label: "TPLink 02" },
      { key: "tplink03", label: "TPLink 03" },
      { key: "tplink04", label: "TPLink 04" },
      { key: "mangueiras", label: "Mangueiras" },
      { key: "paraiso", label: "Paraíso" },
    ];

    let activeFilter = "all";
    let query = "";

    function renderFilters() {
      document.getElementById("filterRow").innerHTML = filters.map(f =>
        `<button class="filter-btn${activeFilter === f.key ? " active" : ""}" onclick="setFilter('${f.key}')">${f.label}</button>`
      ).join("");
    }

    function setFilter(key) {
      activeFilter = key;
      renderFilters();
      render();
    }

    function highlight(text, q) {
      if (!q) return text;
      const idx = text.toLowerCase().indexOf(q.toLowerCase());
      if (idx === -1) return text;
      return text.slice(0, idx) +
        `<span class="highlight">${text.slice(idx, idx + q.length)}</span>` +
        text.slice(idx + q.length);
    }

    function render() {
      const q = query.trim();
      document.getElementById("clearBtn").style.display = q ? "block" : "none";

      let filtered = data.filter(d => {
        const matchFilter = activeFilter === "all" || d.oltKey === activeFilter;
        const matchQuery = !q ||
          d.bairro.toLowerCase().includes(q.toLowerCase()) ||
          d.olt.toLowerCase().includes(q.toLowerCase());
        return matchFilter && matchQuery;
      });

      const unique = [];
      const seen = new Set();
      filtered.forEach(d => {
        const key = d.bairro + "||" + d.olt;
        if (!seen.has(key)) { seen.add(key); unique.push(d); }
      });

      document.getElementById("stats").textContent =
        unique.length === 0 ? "" :
        `${unique.length} resultado${unique.length !== 1 ? "s" : ""} encontrado${unique.length !== 1 ? "s" : ""}`;

      if (unique.length === 0) {
        document.getElementById("results").innerHTML =
          `<div class="empty">Nenhum bairro encontrado para "<strong>${q || oltLabels[activeFilter] || activeFilter}</strong>"</div>`;
        return;
      }

      document.getElementById("results").innerHTML = unique.map(d => `
        <div class="result-card">
          <span class="olt-badge olt-${d.oltKey}">${oltLabels[d.oltKey] || d.olt}</span>
          <div class="card-content">
            <div class="bairro-name">${highlight(d.bairro, q)}</div>
            <div class="olt-name">${highlight(d.olt, q)}</div>
          </div>
        </div>
      `).join("");
    }

    function clearSearch() {
      document.getElementById("searchInput").value = "";
      query = "";
      render();
    }

    document.getElementById("searchInput").addEventListener("input", function () {
      query = this.value;
      render();
    });

    renderFilters();
    render();
  </script>
</body>
</html>
